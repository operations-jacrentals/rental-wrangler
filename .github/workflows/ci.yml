name: CI — boot check

# Runs on every push/PR to the trunk. Flags a broken version (syntax error or boot crash)
# so it can be caught before it affects the live site (app.jacrentals.com).
on:
  push:
    branches: [trunk]
  pull_request:
    branches: [trunk]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Syntax-check the JS modules
        run: |
          set -e
          for f in app.js config.js data.js cascade.js service-countdown.js; do
            node --check "$f" && echo "  ok: $f"
          done

      - name: Install Playwright (Chromium)
        run: |
          npm install --no-save playwright@1.48.0
          npx playwright install --with-deps chromium

      - name: Boot smoke test
        run: node ci/smoke.mjs

      - name: Logic regression suite (money + multi-unit)
        run: node ci/logic-test.mjs

      - name: Staging-lease state machine (pure-Node, mocked git)
        run: node ci/lease-test.mjs

      - name: Staging-lease deploy seam (pure-Node, injected effects)
        run: node ci/lease-deploy-test.mjs

      - name: Promote content-freshness resolver (pure-Node, injected probe)
        run: node ci/promote-test.mjs

      - name: Cache-bust token logic (pure-Node)
        run: node ci/cachebust-test.mjs

      - name: Rulebook field catalog is current
        run: node ci/gen-rule-usage.mjs --check

      - name: Window catalog covers every popup
        run: node ci/check-window-catalog.mjs

      - name: Code Atlas index is current
        run: node tools/gen-code-map.mjs --check

      # Served-file change vs trunk MUST carry a ?v= bump, or production/the service
      # worker serve stale cached bytes. Self-fetches trunk's tip (shallow-safe).
      - name: Cache-bust token bumped when served files change
        run: node ci/check-cachebust.mjs

      - name: DESIGN.md valid & in sync with style.css
        run: node ci/check-design-md.mjs

